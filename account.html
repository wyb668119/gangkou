<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #e8f4f8 0%, #f0f6fa 50%, #e8f4f8 100%); font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; min-height: 100vh; padding: 14px; }
        .app { max-width: 700px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #1a3a4a 0%, #0d2137 100%); padding: 20px 28px; border-radius: 20px 20px 0 0; border-bottom: 3px solid #2c7da0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; box-shadow: 0 4px 20px rgba(44,125,160,0.25); }
        .header h1 { color: #e8f4f8; font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .header h1::before { font-size: 1.3rem; }
        .header-nav a { color: #fff; text-decoration: none; font-size: 0.9rem; font-weight: 600; padding: 8px 18px; background: linear-gradient(135deg, #2c7da0 0%, #1a5f7a 100%); border-radius: 30px; transition: all 0.3s; box-shadow: 0 4px 15px rgba(44,125,160,0.4); border: 1px solid rgba(255,255,255,0.2); }
        .header-nav a:hover { background: linear-gradient(135deg, #3a9bc0 0%, #2c7da0 100%); transform: translateY(-2px); }
        .main { background: #f5f8fb; padding: 18px 24px 24px; border-radius: 0 0 20px 20px; }
        .card { background: white; border-radius: 14px; padding: 20px; border: 1px solid #e2edf7; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .card-title { font-size: 0.88rem; font-weight: 600; color: #1a3a4a; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; padding-bottom: 10px; border-bottom: 1px solid #eef2f7; }

        .login-form { max-width: 320px; margin: 40px auto; text-align: center; }
        .login-form h2 { color: #1a3a4a; margin-bottom: 20px; font-size: 1.1rem; }
        .login-form input { display: block; width: 100%; padding: 10px 14px; margin-bottom: 12px; border: 1px solid #cbdbe0; border-radius: 20px; font-size: 0.85rem; outline: none; }
        .login-form input:focus { border-color: #2c7da0; }

        .btn { background: linear-gradient(135deg, #2c7da0 0%, #1a5f7a 100%); border: none; color: white; padding: 8px 20px; border-radius: 40px; font-weight: 500; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; box-shadow: 0 2px 8px rgba(44,125,160,0.3); border: none; }
        .btn:hover { background: linear-gradient(135deg, #3a9bc0 0%, #2c7da0 100%); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(44,125,160,0.4); }
        .btn-red { background: linear-gradient(135deg, #c0392b 0%, #a93226 100%); } .btn-red:hover { background: linear-gradient(135deg, #d04535 0%, #c0392b 100%); }
        .btn-orange { background: linear-gradient(135deg, #c97b1a 0%, #a8651a 100%); } .btn-orange:hover { background: linear-gradient(135deg, #d98c2a 0%, #c97b1a 100%); }
        .btn-sm { padding: 5px 14px; font-size: 0.8rem; }
        .btn-link { background: linear-gradient(135deg, #e8f4fc 0%, #d6edf7 100%); border: 1px solid #a8d4e6; color: #2c7da0; font-size: 0.72rem; cursor: pointer; padding: 4px 12px; border-radius: 14px; transition: all 0.2s; font-weight: 500; }
        .btn-link:hover { background: linear-gradient(135deg, #2c7da0 0%, #1a5f7a 100%); color: white; border-color: #2c7da0; }

        .msg-area { margin-top: 8px; font-size: 0.8rem; }
        .msg-success { color: #27775a; } .msg-error { color: #c0392b; }

        table { width: 100%; border-collapse: collapse; font-size: 0.78rem; border: 1px solid #b0c4d8; }
        th, td { padding: 7px 8px; text-align: center; border: 1px solid #c8d6e0; }
        th { background: #e8f0f8; color: #1a3a4a; font-weight: 600; }
        td { color: #3a5068; }
        .no-data { text-align: center; padding: 20px; color: #8ba0b5; }

        .form-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 12px 0; }
        .form-row input { padding: 7px 12px; border: 1px solid #cbdbe0; border-radius: 20px; font-size: 0.8rem; flex: 1; min-width: 100px; outline: none; }
        .form-row input:focus { border-color: #2c7da0; }
        .admin-badge { background: #ffd700; color: #1a3a4a; padding: 1px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; }
        .hidden { display: none; }
        @media (max-width: 500px) { .form-row { flex-direction: column; } .form-row input { width: 100%; } }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>👤 账号管理</h1>
        <div class="header-nav"><a href="index.html">← 返回首页</a></div>
    </div>
    <div class="main">
        <!-- 登录区域 -->
        <div id="loginArea" class="card">
            <div class="login-form">
                <h2>管理员登录</h2>
                <input type="text" id="loginUsername" placeholder="账号" autocomplete="off">
                <input type="password" id="loginPassword" placeholder="密码">
                <button class="btn" onclick="doLogin()" style="width:100%;justify-content:center;">登 录</button>
                <div id="loginMsg" class="msg-area"></div>
            </div>
        </div>

        <!-- 首次创建区域 -->
        <div id="firstSetupArea" class="card hidden">
            <div class="login-form">
                <h2>🔑 创建超级管理员</h2>
                <p style="font-size:0.8rem;color:#4a627a;margin-bottom:16px;">首次使用，请创建第一个管理员账号</p>
                <input type="text" id="setupUsername" placeholder="管理员账号" autocomplete="off">
                <input type="password" id="setupPassword" placeholder="密码">
                <button class="btn btn-orange" onclick="createFirstAdmin()" style="width:100%;justify-content:center;">创建超级管理员</button>
                <div id="setupMsg" class="msg-area"></div>
            </div>
        </div>

        <!-- 管理区域 -->
        <div id="adminArea" class="card hidden">
            <div class="card-title">👤 管理员列表</div>
            <div id="adminTableWrap" style="overflow-x:auto;margin-bottom:14px;">
                <table><thead><tr><th>序号</th><th>账号</th><th>角色</th><th>创建时间</th><th>操作</th></tr></thead><tbody id="adminListBody"><tr><td colspan="5" class="no-data">暂无数据</td></tr></tbody></table>
            </div>

            <div style="border-top:1px solid #eef2f7;padding-top:14px;">
                <div class="card-title" style="border-bottom:none;padding-bottom:0;margin-bottom:8px;">➕ 添加账号</div>
                <div class="form-row">
                    <input type="text" id="newUsername" placeholder="新账号">
                    <input type="password" id="newPassword" placeholder="密码">
                    <button class="btn btn-sm" onclick="addAccount()">添加</button>
                </div>
                <div id="adminMsg" class="msg-area"></div>
            </div>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://yzqqkslbixqqgzjzekku.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6cXFrc2xiaXhxcWd6anpla2t1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMTYzNjcsImV4cCI6MjA5MTc5MjM2N30.8sXLtcreqjchJeI3F3oxsluKEBH8NZ3lgtWcKK6aOnY';
const ACCOUNTS_TABLE = 'gangkou_admin_accounts';

let loggedInUser = null;

function sbHeaders(extra = {}) {
    return { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation', ...extra };
}

function showMsg(id, msg, type) { const el = document.getElementById(id); el.className = 'msg-area msg-' + (type || 'success'); el.textContent = msg; setTimeout(() => el.textContent = '', 5000); }

async function doLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    if (!username || !password) { showMsg('loginMsg', '请输入账号和密码', 'error'); return; }
    try {
        const url = `${SUPABASE_URL}/rest/v1/${ACCOUNTS_TABLE}?username=eq.${encodeURIComponent(username)}&password=eq.${encodeURIComponent(password)}&select=id,username,role`;
        const resp = await fetch(url, { headers: sbHeaders() });
        if (!resp.ok) { showMsg('loginMsg', '查询失败: ' + resp.status, 'error'); return; }
        const rows = await resp.json();
        if (rows.length === 0) { showMsg('loginMsg', '账号或密码错误', 'error'); return; }
        loggedInUser = rows[0];
        document.getElementById('loginArea').classList.add('hidden');
        document.getElementById('adminArea').classList.remove('hidden');
        loadAdminList();
    } catch (e) { showMsg('loginMsg', '登录失败: ' + e.message, 'error'); }
}

async function loadAdminList() {
    try {
        const url = `${SUPABASE_URL}/rest/v1/${ACCOUNTS_TABLE}?select=id,username,role,created_at&order=id`;
        const resp = await fetch(url, { headers: sbHeaders() });
        if (!resp.ok) return;
        const rows = await resp.json();
        const tbody = document.getElementById('adminListBody');
        if (rows.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="no-data">暂无数据</td></tr>'; return; }
        tbody.innerHTML = rows.map((r, i) => {
            const isSelf = loggedInUser && r.id === loggedInUser.id;
            const roleBadge = r.role === 'super_admin' ? '<span class="admin-badge">超级管理员</span>' : '管理员';
            return `<tr>
                <td>${i + 1}</td>
                <td>${esc(r.username)}</td>
                <td>${roleBadge}</td>
                <td>${r.created_at ? r.created_at.slice(0, 10) : '-'}</td>
                <td>
                    <button class="btn-link btn-sm" onclick="editAccount(${r.id}, '${esc(r.username)}')">修改</button>
                    ${!isSelf ? `<button class="btn-link btn-sm" style="color:#c0392b;border-color:#e6b0aa;" onclick="deleteAccount(${r.id}, '${esc(r.username)}')">删除</button>` : ''}
                </td>
            </tr>`;
        }).join('');
    } catch (e) { showMsg('adminMsg', '加载失败: ' + e.message, 'error'); }
}

function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

async function addAccount() {
    const username = document.getElementById('newUsername').value.trim();
    const password = document.getElementById('newPassword').value.trim();
    if (!username || !password) { showMsg('adminMsg', '请填写账号和密码', 'error'); return; }
    try {
        // Check if first account -> super_admin
        const countUrl = `${SUPABASE_URL}/rest/v1/${ACCOUNTS_TABLE}?select=id&limit=1`;
        const countResp = await fetch(countUrl, { headers: sbHeaders({ 'Prefer': 'count=exact' }) });
        const isFirst = !countResp.ok || parseInt(countResp.headers.get('Content-Range')?.split('/')[1] || '0') === 0;
        const role = isFirst ? 'super_admin' : 'admin';
        const url = `${SUPABASE_URL}/rest/v1/${ACCOUNTS_TABLE}`;
        const resp = await fetch(url, {
            method: 'POST',
            headers: sbHeaders(),
            body: JSON.stringify({ username, password, role })
        });
        if (!resp.ok) {
            const err = await resp.text();
            if (resp.status === 409) { showMsg('adminMsg', '账号已存在', 'error'); return; }
            showMsg('adminMsg', '添加失败: ' + err, 'error'); return;
        }
        document.getElementById('newUsername').value = '';
        document.getElementById('newPassword').value = '';
        showMsg('adminMsg', `✅ 已添加${role === 'super_admin' ? '（超级管理员）' : ''}`, 'success');
        loadAdminList();
    } catch (e) { showMsg('adminMsg', '添加失败: ' + e.message, 'error'); }
}

function editAccount(id, username) {
    const newPw = prompt(`修改账号「${username}」的密码：`);
    if (!newPw) return;
    (async () => {
        try {
            const url = `${SUPABASE_URL}/rest/v1/${ACCOUNTS_TABLE}?id=eq.${id}`;
            const resp = await fetch(url, {
                method: 'PATCH',
                headers: sbHeaders(),
                body: JSON.stringify({ password: newPw })
            });
            if (!resp.ok) { showMsg('adminMsg', '修改失败', 'error'); return; }
            showMsg('adminMsg', '✅ 密码已修改', 'success');
            loadAdminList();
        } catch (e) { showMsg('adminMsg', '修改失败: ' + e.message, 'error'); }
    })();
}

async function deleteAccount(id, username) {
    if (loggedInUser && id === loggedInUser.id) return;
    if (!confirm(`确定删除账号「${username}」？`)) return;
    try {
        const url = `${SUPABASE_URL}/rest/v1/${ACCOUNTS_TABLE}?id=eq.${id}`;
        const resp = await fetch(url, { method: 'DELETE', headers: sbHeaders() });
        if (!resp.ok) { showMsg('adminMsg', '删除失败', 'error'); return; }
        showMsg('adminMsg', `✅ 已删除「${username}」`, 'success');
        loadAdminList();
    } catch (e) { showMsg('adminMsg', '删除失败: ' + e.message, 'error'); }
}

// 首次创建超级管理员
async function createFirstAdmin() {
    const username = document.getElementById('setupUsername').value.trim();
    const password = document.getElementById('setupPassword').value.trim();
    if (!username || !password) { showMsg('setupMsg', '请填写账号和密码', 'error'); return; }
    try {
        const url = `${SUPABASE_URL}/rest/v1/${ACCOUNTS_TABLE}`;
        const resp = await fetch(url, {
            method: 'POST',
            headers: sbHeaders(),
            body: JSON.stringify({ username, password, role: 'super_admin' })
        });
        if (!resp.ok) {
            const err = await resp.text();
            if (resp.status === 409) { showMsg('setupMsg', '账号已存在', 'error'); return; }
            showMsg('setupMsg', '创建失败: ' + err, 'error'); return;
        }
        showMsg('setupMsg', '✅ 超级管理员创建成功，请登录', 'success');
        document.getElementById('firstSetupArea').classList.add('hidden');
        document.getElementById('loginArea').classList.remove('hidden');
        document.getElementById('loginUsername').value = username;
    } catch (e) { showMsg('setupMsg', '创建失败: ' + e.message, 'error'); }
}

// 页面加载时检查是否有账号
(async function init() {
    try {
        const url = `${SUPABASE_URL}/rest/v1/${ACCOUNTS_TABLE}?select=id&limit=1`;
        const resp = await fetch(url, { headers: sbHeaders({ 'Prefer': 'count=exact' }) });
        if (!resp.ok) return;
        const count = parseInt(resp.headers.get('Content-Range')?.split('/')[1] || '1');
        if (count === 0) {
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('firstSetupArea').classList.remove('hidden');
        }
    } catch (e) { /* 静默处理 */ }
})();
</script>
</body>
</html>
